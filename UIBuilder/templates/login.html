{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<section class="auth-card">
  <h1 class="page-title">Log in</h1>
  <p class="lede">Access saved home profiles and risk assessments.</p>
  <form class="stack-form" method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="next" value="{{ next_url or '' }}" />
    <label class="field">
      <span class="field__label">Username</span>
      <input class="field__input" type="text" name="username" autocomplete="username" required />
    </label>
    <label class="field">
      <span class="field__label">Password</span>
      <input class="field__input" type="password" name="password" autocomplete="current-password" required />
    </label>
    <button type="submit" class="btn btn--primary btn--block">Continue</button>
  </form>
  <p class="auth-foot">No account? <a href="{{ url_for('register') }}">Sign up</a></p>
  {% if demo_hint %}
  <p class="panel__hint">{{ demo_hint }}</p>
  {% endif %}
</section>
{% endblock %}
