{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<section class="auth-card">
  <h1 class="page-title">Create account</h1>
  <p class="lede">Local SQLite account — credentials stay in <code class="inline-code">data/auth.db</code> on this server.</p>
  <form class="stack-form" method="post" action="{{ url_for('register') }}">
    <label class="field">
      <span class="field__label">Username</span>
      <input class="field__input" type="text" name="username" autocomplete="username" minlength="2" required />
    </label>
    <label class="field">
      <span class="field__label">Password</span>
      <input class="field__input" type="password" name="password" autocomplete="new-password" minlength="6" required />
    </label>
    <button type="submit" class="btn btn--primary btn--block">Create account</button>
  </form>
  <p class="auth-foot">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</section>
{% endblock %}
